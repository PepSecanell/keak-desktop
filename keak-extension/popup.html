<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 240px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #F5EDD8;
    color: #2C1508;
    padding: 16px 16px 14px;
  }
  .header {
    display: flex;
    align-items: center;
    gap: 9px;
    margin-bottom: 13px;
  }
  .header img {
    width: 28px;
    height: 28px;
    border-radius: 7px;
  }
  .header-text {
    font-weight: 700;
    font-size: 15px;
    color: #2C1508;
    letter-spacing: -0.2px;
  }
  .status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12.5px;
    font-weight: 500;
    padding: 9px 11px;
    background: #EDE4CC;
    border-radius: 10px;
    margin-bottom: 11px;
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    background: #D4A49A;
  }
  .dot.on {
    background: #6dbf8a;
  }
  .hint {
    font-size: 11.5px;
    color: #7a5c48;
    line-height: 1.55;
  }
  .hint strong {
    color: #2C1508;
  }
</style>
</head>
<body>
<div class="header">
  <img src="icons/icon_32.png" alt="Keak">
  <span class="header-text">Keak Browser Bridge</span>
</div>
<div class="status">
  <div class="dot" id="dot"></div>
  <span id="label">Checking...</span>
</div>
<p class="hint">Hold <strong>Ctrl + Alt</strong> and ask Keak AI to click, type, or interact with this page.</p>
<script src="popup.js"></script>
</body>
</html>
