name: Desktop Release

# Builds Keak installers for Windows and macOS and publishes them to a GitHub Release.
# Windows is shipped UNSIGNED (free). macOS is signed + notarized with the Apple Developer account
# (reuses the Keoly account). Trigger by pushing a version tag, e.g.  git tag v0.1.1 && git push --tags
# or run it manually from the Actions tab.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # PREFLIGHT (cheap, ~30s on a free Linux runner). Proves the RELEASE_TOKEN can actually create a
  # release on THIS repo BEFORE we spend a 10-minute Windows build. It prints the real repo name CI
  # is using and the token account, then creates + deletes a draft release. If the token/repo is
  # wrong it fails HERE in seconds (no wasted Windows minutes). The Windows build only runs if this
  # passes — and if it passes, the real release below is guaranteed to work (identical token, repo,
  # and API call).
  preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Verify RELEASE_TOKEN can create a release on this repo
        env:
          RT: ${{ secrets.RELEASE_TOKEN }}
        run: |
          set -e
          echo "Target repo (GITHUB_REPOSITORY): $GITHUB_REPOSITORY"
          if [ -z "$RT" ]; then
            echo "::error::RELEASE_TOKEN secret is EMPTY. Add it in Settings > Secrets and variables > Actions."
            exit 1
          fi
          who=$(curl -s -H "Authorization: Bearer $RT" -H "User-Agent: keak" https://api.github.com/user | grep '"login"' | head -1 | sed 's/[",]//g' | xargs)
          echo "Token $who"
          code=$(curl -s -o /tmp/rel.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $RT" -H "User-Agent: keak" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/releases" \
            -d '{"tag_name":"preflight-delete-me","name":"preflight","draft":true}')
          echo "Create-release HTTP status: $code"
          if [ "$code" != "201" ]; then
            echo "::error::RELEASE_TOKEN cannot create a release on $GITHUB_REPOSITORY (HTTP $code). Details below."
            cat /tmp/rel.json
            echo ""
            echo "FIX: the RELEASE_TOKEN secret must be a CLASSIC token (github.com/settings/tokens/new)"
            echo "with the 'repo' scope, created by the account that owns $GITHUB_REPOSITORY."
            exit 1
          fi
          rid=$(grep '"id"' /tmp/rel.json | head -1 | tr -dc '0-9')
          curl -s -X DELETE -H "Authorization: Bearer $RT" -H "User-Agent: keak" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/releases/$rid" > /dev/null
          echo "OK: token created and cleaned up a draft release on $GITHUB_REPOSITORY. Safe to build."

  build:
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
            rust_targets: ""
          # Mac is temporarily disabled so we can confirm the release-permission fix on cheap Windows minutes
          # first (macOS runners cost ~10x). Re-enable this block once a Windows run publishes green.
          # - platform: macos-14
          #   args: "--target universal-apple-darwin"
          #   rust_targets: "aarch64-apple-darwin,x86_64-apple-darwin"

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      # The Supabase URL + anon key are PUBLISHABLE (public) keys, safe to expose in the built app.
      # They live as repo Variables so we do not commit .env. Vite bakes them in at build time.
      - name: Write .env
        shell: bash
        run: |
          echo "VITE_SUPABASE_URL=${{ vars.VITE_SUPABASE_URL }}" >> .env
          echo "VITE_SUPABASE_ANON_KEY=${{ vars.VITE_SUPABASE_ANON_KEY }}" >> .env
          # Shared OAuth app credentials for the one-click sign-ins. Stored as repo Secrets (not in the code),
          # baked in by Vite at build time. Add each in Settings > Secrets and variables > Actions > Secrets.
          # Secret names match exactly what is set in the repo (google_id has no VITE_ prefix; the rest do).
          echo "VITE_KEAK_GOOGLE_CLIENT_ID=${{ secrets.KEAK_GOOGLE_CLIENT_ID }}" >> .env
          echo "VITE_KEAK_GOOGLE_CLIENT_SECRET=${{ secrets.VITE_KEAK_GOOGLE_CLIENT_SECRET }}" >> .env
          echo "VITE_KEAK_MS_CLIENT_ID=${{ secrets.VITE_KEAK_MS_CLIENT_ID }}" >> .env
          echo "VITE_KEAK_NOTION_CLIENT_ID=${{ secrets.VITE_KEAK_NOTION_CLIENT_ID }}" >> .env
          echo "VITE_KEAK_NOTION_CLIENT_SECRET=${{ secrets.VITE_KEAK_NOTION_CLIENT_SECRET }}" >> .env
          echo "VITE_KEAK_SLACK_CLIENT_ID=${{ secrets.VITE_KEAK_SLACK_CLIENT_ID }}" >> .env
          echo "VITE_KEAK_SLACK_CLIENT_SECRET=${{ secrets.VITE_KEAK_SLACK_CLIENT_SECRET }}" >> .env
          echo "VITE_KEAK_GITHUB_CLIENT_ID=${{ secrets.VITE_KEAK_GITHUB_CLIENT_ID }}" >> .env

      # Use a Personal Access Token (secret RELEASE_TOKEN) to create the Release, NOT the built-in
      # GITHUB_TOKEN. On this repo (transferred from keolyapp) the built-in token is denied the
      # release-create call ("Resource not accessible by integration") even with Read and write
      # permissions set. A classic PAT with the 'repo' scope bypasses that entirely. The preflight
      # job above has already proven this exact token works on this repo.
      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || 'v0.0.0-dev' }}
          releaseName: "Keak ${{ github.ref_type == 'tag' && github.ref_name || 'dev build' }}"
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
