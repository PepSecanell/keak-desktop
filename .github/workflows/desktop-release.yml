name: Desktop Release

# Builds Keak installers for Windows and macOS and publishes them to a GitHub Release.
# Windows is shipped UNSIGNED (free). macOS is signed + notarized with the Apple Developer account
# (reuses the Keoly account). Trigger by pushing a version tag, e.g.  git tag v0.1.1 && git push --tags
# or run it manually from the Actions tab.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
            rust_targets: ""
          # Mac is temporarily disabled so we can confirm the release-permission fix on cheap Windows minutes
          # first (macOS runners cost ~10x). Re-enable this block once a Windows run publishes green.
          # - platform: macos-14
          #   args: "--target universal-apple-darwin"
          #   rust_targets: "aarch64-apple-darwin,x86_64-apple-darwin"

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      # The Supabase URL + anon key are PUBLISHABLE (public) keys, safe to expose in the built app.
      # They live as repo Variables so we do not commit .env. Vite bakes them in at build time.
      - name: Write .env
        shell: bash
        run: |
          echo "VITE_SUPABASE_URL=${{ vars.VITE_SUPABASE_URL }}" >> .env
          echo "VITE_SUPABASE_ANON_KEY=${{ vars.VITE_SUPABASE_ANON_KEY }}" >> .env
          # Shared OAuth app credentials for the one-click sign-ins. Stored as repo Secrets (not in the code),
          # baked in by Vite at build time. Add each in Settings > Secrets and variables > Actions > Secrets.
          # Secret names match exactly what is set in the repo (google_id has no VITE_ prefix; the rest do).
          echo "VITE_KEAK_GOOGLE_CLIENT_ID=${{ secrets.KEAK_GOOGLE_CLIENT_ID }}" >> .env
          echo "VITE_KEAK_GOOGLE_CLIENT_SECRET=${{ secrets.VITE_KEAK_GOOGLE_CLIENT_SECRET }}" >> .env
          echo "VITE_KEAK_MS_CLIENT_ID=${{ secrets.VITE_KEAK_MS_CLIENT_ID }}" >> .env
          echo "VITE_KEAK_NOTION_CLIENT_ID=${{ secrets.VITE_KEAK_NOTION_CLIENT_ID }}" >> .env
          echo "VITE_KEAK_NOTION_CLIENT_SECRET=${{ secrets.VITE_KEAK_NOTION_CLIENT_SECRET }}" >> .env
          echo "VITE_KEAK_SLACK_CLIENT_ID=${{ secrets.VITE_KEAK_SLACK_CLIENT_ID }}" >> .env
          echo "VITE_KEAK_SLACK_CLIENT_SECRET=${{ secrets.VITE_KEAK_SLACK_CLIENT_SECRET }}" >> .env
          echo "VITE_KEAK_GITHUB_CLIENT_ID=${{ secrets.VITE_KEAK_GITHUB_CLIENT_ID }}" >> .env

      # Use a Personal Access Token (secret RELEASE_TOKEN) to create the Release, NOT the built-in
      # GITHUB_TOKEN. On this repo (transferred from keolyapp) the built-in token is denied the
      # release-create call ("Resource not accessible by integration") even with Read and write
      # permissions set. A PAT with Contents: write bypasses that entirely.
      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || 'v0.0.0-dev' }}
          releaseName: "Keak ${{ github.ref_type == 'tag' && github.ref_name || 'dev build' }}"
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
