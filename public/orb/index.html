<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 220px; height: 64px;
  background: transparent;
  overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  font-family: Inter, system-ui, sans-serif;
  user-select: none;
}
.orb-wrap {
  display: flex; align-items: center; gap: 10px;
  background: rgba(42, 20, 8, 0.82);
  border: 1px solid #D4A49A;
  border-radius: 32px;
  padding: 10px 18px;
  backdrop-filter: blur(8px);
}
.orb {
  width: 18px; height: 18px; border-radius: 50%;
  background: #D4A49A;
  box-shadow: 0 0 10px #D4A49A88;
  flex-shrink: 0;
}
.waves {
  display: flex; align-items: center; gap: 3px; height: 22px;
}
.bar {
  width: 3px; border-radius: 2px;
  background: #D4A49A;
  animation: wave 0.9s ease-in-out infinite;
}
.bar:nth-child(1) { animation-delay: 0s; }
.bar:nth-child(2) { animation-delay: 0.12s; }
.bar:nth-child(3) { animation-delay: 0.24s; }
.bar:nth-child(4) { animation-delay: 0.36s; }
.bar:nth-child(5) { animation-delay: 0.48s; }
@keyframes wave {
  0%, 100% { height: 5px; opacity: 0.5; }
  50% { height: 18px; opacity: 1; }
}
.label {
  font-size: 12px; font-weight: 500;
  color: #EDE4CC; letter-spacing: 0.02em;
}
</style>
</head>
<body>
<div class="orb-wrap">
  <div class="orb"></div>
  <div class="waves">
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div><div class="bar"></div>
  </div>
  <span class="label">Listening</span>
</div>
</body>
</html>
